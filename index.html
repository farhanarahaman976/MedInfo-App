<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medicine Info App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>Medicine Information</h1>
      <p>Browse basic medicine descriptions, categories, and usage notes.</p>
    </div>
  </header>

  <main class="container">
    <section class="search-panel">
      <label for="search">Search medicines</label>
      <input id="search" type="search" placeholder="Enter medicine name or category" />
      <select id="category-filter">
        <option value="all">All categories</option>
      </select>
    </section>

    <section id="medicine-list" class="medicine-list">
      <!-- Medicine cards will render here -->
    </section>
  </main>

  <footer>
    <div class="container">
      <p>Basic medicine information app created for demonstration.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
